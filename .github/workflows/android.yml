name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.6'

    - name: Create google-services.json dummy
      run: |
        echo '{"project_info": {"project_number": "123456789012","project_id": "dummy","storage_bucket": "dummy"},"client": [{"client_info": {"mobilesdk_app_id": "1:123456789012:android:abc","android_client_info": {"package_name": "com.kurostream.tv"}},"api_key": [{"current_key": "dummy"}],"services": {"appinvite_service": {"other_platform_oauth_client": []}}}]}' > app/google-services.json

    - name: Build with Gradle
      run: gradle assembleDebug
